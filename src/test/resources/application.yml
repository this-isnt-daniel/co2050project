spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///forensic_test_db
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: test-secret-key-that-is-long-enough-for-hmac-sha-at-least-64-chars-here-ok
    expiration-ms: 86400000
  storage:
    document-base-path: ${java.io.tmpdir}/forensic-test-docs
  notification:
    pending-report-threshold-days: 7
    court-date-upcoming-days: 14
  cors:
    allowed-origins: http://localhost:3000
